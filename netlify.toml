[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "nft"
  directory = "netlify/functions"
  included_files = ["config.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
